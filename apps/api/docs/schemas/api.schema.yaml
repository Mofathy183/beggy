components:
  schemas:
    DateRange:
      type: object
      additionalProperties: false
      properties:
        from:
          type: string
          format: date-time
          description: Start date (inclusive)
        to:
          type: string
          format: date-time
          description: End date (inclusive)

    NumberRange:
      type: object
      additionalProperties: false
      properties:
        min:
          type: number
          description: Minimum value (inclusive)
        max:
          type: number
          description: Maximum value (inclusive)

    #* Query Pagination ////////////////////////////////////////
    Pagination:
      type: object
      additionalProperties: false
      properties:
        page:
          type: integer
          minimum: 1
          maximum: 100
          default: 1
          description: Page number (1-based)

        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
          description: Maximum number of items per page

    #* Query OrderBy ////////////////////////////////////////
    UserOrderBy:
      type: object
      additionalProperties: false
      properties:
        orderBy:
          $ref: "#/components/schemas/UserOrderByField"

        direction:
          allOf:
            - $ref: "#/components/schemas/OrderDirection"
          default: ASC

    ProfileOrderBy:
      type: object
      additionalProperties: false
      properties:
        orderBy:
          $ref: "#/components/schemas/ProfileOrderByField"

        direction:
          allOf:
            - $ref: "#/components/schemas/OrderDirection"
          default: ASC

    ItemOrderBy:
      type: object
      additionalProperties: false
      properties:
        orderBy:
          $ref: "#/components/schemas/ItemOrderByField"

        direction:
          allOf:
            - $ref: "#/components/schemas/OrderDirection"
          default: ASC

    BagOrderBy:
      type: object
      additionalProperties: false
      properties:
        orderBy:
          $ref: "#/components/schemas/BagOrderByField"

        direction:
          allOf:
            - $ref: "#/components/schemas/OrderDirection"
          default: ASC

    SuitcaseOrderBy:
      type: object
      additionalProperties: false
      properties:
        orderBy:
          $ref: "#/components/schemas/SuitcaseOrderByField"

        direction:
          allOf:
            - $ref: "#/components/schemas/OrderDirection"
          default: ASC

    #* Query Filter ////////////////////////////////////////
    UserFilter:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email

        role:
          $ref: "#/components/schemas/Role"

        isActive:
          type: boolean

        isEmailVerified:
          type: boolean

        createdAt:
          $ref: "#/components/schemas/DateRange"

    ProfileFilter:
      type: object
      additionalProperties: false
      properties:
        city:
          type: string

        country:
          type: string

        createdAt:
          $ref: "#/components/schemas/DateRange"

    ItemFilter:
      type: object
      additionalProperties: false
      properties:
        category:
          $ref: "#/components/schemas/ItemCategory"

        color:
          type: string

        isFragile:
          type: boolean

        weight:
          $ref: "#/components/schemas/NumberRange"

        volume:
          $ref: "#/components/schemas/NumberRange"

        createdAt:
          $ref: "#/components/schemas/DateRange"

    BagFilter:
      type: object
      additionalProperties: false
      properties:
        type:
          $ref: "#/components/schemas/BagType"

        size:
          $ref: "#/components/schemas/Size"

        material:
          $ref: "#/components/schemas/Material"

        color:
          type: string

        maxCapacity:
          $ref: "#/components/schemas/NumberRange"

        maxWeight:
          $ref: "#/components/schemas/NumberRange"

        createdAt:
          $ref: "#/components/schemas/DateRange"

    SuitcaseFilter:
      type: object
      additionalProperties: false
      properties:
        type:
          $ref: "#/components/schemas/SuitcaseType"

        size:
          $ref: "#/components/schemas/Size"

        wheels:
          $ref: "#/components/schemas/WheelType"

        material:
          $ref: "#/components/schemas/Material"

        color:
          type: string

        maxCapacity:
          $ref: "#/components/schemas/NumberRange"

        maxWeight:
          $ref: "#/components/schemas/NumberRange"

        createdAt:
          $ref: "#/components/schemas/DateRange"

    #* Meta ////////////////////////////////////////
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1

        limit:
          type: integer
          example: 10

        count:
          type: integer
          example: 10

        totalItems:
          type: integer
          nullable: true
          example: 120

        totalPages:
          type: integer
          example: 12

        hasNextPage:
          type: boolean

        hasPreviousPage:
          type: boolean

  parameters:
    #* Param ////////////////////////////////////////
    UuidParam:
      name: id
      in: path
      required: true
      description: Resource unique identifier
      schema:
        type: string
        format: uuid
