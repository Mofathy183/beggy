components:
  schemas:
    ProfileDTO:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        gender:
          allOf:
            - $ref: "#/components/schemas/Gender"
          nullable: true
        birthDate:
          type: string
          format: date
          nullable: true
        country:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
          description: Computed display name derived from profile data
        age:
          type: integer
          nullable: true
          description: Computed age derived from birthDate
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PublicProfileDTO:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        country:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        age:
          type: integer
          nullable: true

    EditProfileRequest:
      type: object
      additionalProperties: false
      properties:
        firstName:
          type: string
        lastName:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        gender:
          allOf:
            - $ref: "#/components/schemas/Gender"
          nullable: true
        birthDate:
          type: string
          format: date
          nullable: true
        country:
          type: string
          nullable: true
        city:
          type: string
          nullable: true

    PrivateProfileResponseData:
      $ref: "#/components/schemas/ProfileDTO"

    PublicProfileResponseData:
      $ref: "#/components/schemas/PublicProfileDTO"
